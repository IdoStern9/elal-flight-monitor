<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Al Flight Monitor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 240px;
  --header-h: 44px;
  --datebar-h: 40px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

[data-theme="dark"] {
  --bg: #222d42;
  --surface: #2e3e58;
  --surface2: #3b5070;
  --surface3: #4d6588;
  --border: rgba(170,200,240,0.2);
  --border-active: rgba(170,200,240,0.4);
  --text: #f3f6fb;
  --text-dim: #b4c5dc;
  --text-faint: #8a9dba;
  --accent: #70b0ff;
  --accent-dim: rgba(112,176,255,0.18);
  --green: #5ce898;
  --green-bg: rgba(92,232,152,0.18);
  --green-glow: rgba(92,232,152,0.35);
  --red: #ff9b9b;
  --red-bg: rgba(255,155,155,0.16);
  --yellow: #fdd85d;
  --yellow-bg: rgba(253,216,93,0.14);
  --orange: #ffb86c;
  --shadow: rgba(0,0,0,0.4);
  --check-text: #fff;
}

[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e8ecf2;
  --surface3: #d5dce6;
  --border: rgba(60,80,120,0.12);
  --border-active: rgba(60,80,120,0.3);
  --text: #1a2332;
  --text-dim: #556278;
  --text-faint: #8494a8;
  --accent: #2b7fff;
  --accent-dim: rgba(43,127,255,0.1);
  --green: #16a34a;
  --green-bg: rgba(22,163,74,0.1);
  --green-glow: rgba(22,163,74,0.2);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,0.08);
  --yellow: #ca8a04;
  --yellow-bg: rgba(202,138,4,0.08);
  --orange: #ea580c;
  --shadow: rgba(0,0,0,0.08);
  --check-text: #fff;
}

html { font-size: var(--base-font, 15px); }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

/* ── Top bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1rem;
  backdrop-filter: blur(12px);
}
.topbar-brand { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.topbar-brand svg { width: 20px; height: 20px; color: var(--accent); }
.topbar-title { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; }
.topbar-controls { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.topbar-control { display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: var(--text-dim); }
.topbar-control label { white-space: nowrap; }
.ctrl-input {
  width: 42px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 0.2rem 0.3rem; border-radius: 4px;
  font-family: var(--mono); font-size: 0.75rem; text-align: center;
  -moz-appearance: textfield; appearance: textfield;
}
.ctrl-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.ctrl-input::-webkit-inner-spin-button,
.ctrl-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

.topbar-control { position: relative; }
.ctrl-spinner {
  display: inline-flex; flex-direction: column; gap: 1px; margin-inline-start: 2px;
}
.ctrl-spinner button {
  display: flex; align-items: center; justify-content: center;
  width: 16px; height: 12px; padding: 0; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-faint); border-radius: 3px;
  cursor: pointer; font-size: 0.55rem; line-height: 1; transition: all 0.12s;
  user-select: none; outline: none; caret-color: transparent;
}
.ctrl-spinner button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.ctrl-spinner button:active { transform: scale(0.9); }
.ctrl-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.72rem;
  font-family: var(--font); cursor: pointer; transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }
.ctrl-btn.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.status-pill {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.7rem; font-family: var(--mono); color: var(--text-dim);
  background: var(--surface2); padding: 0.2rem 0.5rem; border-radius: 20px;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.err { background: var(--red); box-shadow: 0 0 6px var(--red); }
.status-dot.wait { background: var(--yellow); animation: blink 1.5s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── Sidebar ── */
.sidebar {
  position: fixed; top: var(--header-h); bottom: 0; right: 0;
  width: var(--sidebar-w); background: var(--surface);
  border-inline-start: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 50;
  transition: transform 0.25s ease;
}
.sidebar.collapsed { transform: translateX(calc(var(--sidebar-w) * -1)); }
.sidebar-header {
  padding: 0.55rem 0.75rem 0.45rem;
  font-size: 0.68rem; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-search {
  margin: 0.4rem 0.6rem; padding: 0.3rem 0.55rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text); font-size: 0.78rem;
  font-family: var(--font); width: calc(100% - 1.2rem);
}
.sidebar-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.sidebar-search::placeholder { color: var(--text-faint); }

.dest-list { flex: 1; overflow-y: auto; padding: 0.35rem 0; }
.dest-list::-webkit-scrollbar { width: 4px; }
.dest-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.dest-item {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.3rem 0.75rem; cursor: pointer; transition: background 0.12s;
  font-size: 0.78rem; position: relative;
}
.dest-item:hover { background: var(--surface2); }
.dest-item.selected { background: var(--accent-dim); }
.dest-item.selected .dest-item-code { color: var(--accent); }

.dest-item-check {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--text-faint); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.dest-item.selected .dest-item-check { border-color: var(--accent); background: var(--accent); }
.dest-item.selected .dest-item-check::after { content: '✓'; color: var(--check-text); font-size: 0.6rem; font-weight: 700; }

.dest-item-code { font-family: var(--mono); font-weight: 600; font-size: 0.82rem; min-width: 32px; }
.dest-item-name { color: var(--text-dim); font-size: 0.78rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dest-item-badge {
  font-family: var(--mono); font-size: 0.68rem; padding: 0.1rem 0.35rem;
  border-radius: 4px; font-weight: 500;
}
.dest-item-badge.has-seats { background: var(--green-bg); color: var(--green); }
.dest-item-badge.no-seats { background: var(--surface3); color: var(--text-faint); }

.sidebar-footer {
  padding: 0.65rem 1rem; border-top: 1px solid var(--border);
  display: flex; gap: 0.5rem;
}
.sidebar-footer button {
  flex: 1; padding: 0.4rem; border-radius: 5px; font-size: 0.75rem;
  font-family: var(--font); cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-dim); transition: all 0.12s;
}
.sidebar-footer button:hover { border-color: var(--accent); color: var(--text); }

/* ── Main content ── */
.main {
  margin-top: calc(var(--header-h) + var(--datebar-h));
  margin-right: var(--sidebar-w);
  height: calc(100vh - var(--header-h) - var(--datebar-h));
  overflow-y: auto;
  padding: 0.75rem 1rem 3rem;
  transition: margin-right 0.25s ease;
}
.main.expanded { margin-right: 0; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ── Alert banner ── */
.alert-banner {
  display: none; margin-bottom: 1rem; padding: 1rem 1.25rem;
  border-radius: 10px; border: 1px solid var(--green);
  background: linear-gradient(135deg, var(--green-bg), var(--accent-dim));
  animation: slideIn 0.35s ease-out; flex-direction: column; gap: 0.6rem;
}
.alert-banner.show { display: flex; }
.alert-header { display: flex; align-items: center; gap: 0.6rem; }
.alert-icon { font-size: 1.2rem; flex-shrink: 0; }
.alert-header h3 { font-size: 0.9rem; font-weight: 700; }
.alert-list { display: flex; flex-direction: column; gap: 0.4rem; }
.alert-flight {
  display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
  background: var(--surface2); border-radius: 7px; padding: 0.45rem 0.7rem;
  font-size: 0.82rem; text-decoration: none; color: inherit; transition: background 0.15s, border-color 0.15s;
  border: 1px solid transparent; cursor: pointer;
}
.alert-flight:hover { background: var(--green-bg); border-color: var(--green); }
.alert-flight .af-dest { font-family: var(--mono); font-weight: 700; color: var(--accent); font-size: 0.84rem; }
.alert-flight .af-fn { font-family: var(--mono); font-weight: 600; }
.alert-flight .af-detail { color: var(--text-dim); font-size: 0.78rem; }
.alert-flight .af-seats {
  font-family: var(--mono); font-weight: 700; color: var(--green);
  background: var(--green-bg); padding: 0.15rem 0.45rem; border-radius: 5px;
  margin-inline-start: auto;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Stats row ── */
.stats-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.5rem 0.75rem; min-width: 100px; flex: 1; max-width: 200px;
}
.stat-label { font-size: 0.65rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: 0.15rem; }
.stat-value { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; }
.stat-value.green { color: var(--green); }

/* ── Destination groups ── */
.dest-group { margin-bottom: 1rem; }
.dest-group-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.45rem 0; margin-bottom: 0.4rem; cursor: pointer; user-select: none;
}
.dest-group-header:hover .dest-group-name { color: var(--text); }
.dest-group-toggle { color: var(--text-faint); font-size: 0.65rem; transition: transform 0.2s; }
.dest-group-toggle.open { transform: rotate(90deg); }
.dest-group-code {
  font-family: var(--mono); font-weight: 700; font-size: 0.82rem;
  color: var(--accent); background: var(--accent-dim);
  padding: 0.12rem 0.4rem; border-radius: 5px;
}
.dest-group-name { font-size: 0.78rem; color: var(--text-dim); transition: color 0.12s; }
.dest-group-seats-tag {
  margin-inline-start: auto; font-size: 0.7rem; font-family: var(--mono);
  padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 500;
}
.dest-group-seats-tag.available { background: var(--green-bg); color: var(--green); }
.dest-group-seats-tag.none { background: var(--surface2); color: var(--text-faint); }

.dest-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  margin-bottom: 0.25rem; table-layout: fixed;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden;
}
.dest-table thead th {
  font-size: 0.7rem; color: var(--text-faint); font-weight: 600; font-family: var(--mono);
  padding: 0.4rem 0.3rem; text-align: center;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  border-inline-start: 1px solid var(--border);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  line-height: 1.3;
}
.dest-table thead th:first-child { text-align: right; width: 72px; border-inline-start: none; }
.dest-table thead th:nth-child(2) { text-align: right; width: 56px; }
.dest-table tbody tr { transition: background 0.1s; }
.dest-table tbody tr:hover { background: var(--accent-dim); }
.dest-table tbody td {
  padding: 0.35rem 0.3rem; border-bottom: 1px solid var(--border);
  border-inline-start: 1px solid var(--border); text-align: center;
}
.dest-table tbody td:first-child { border-inline-start: none; text-align: right; }
.dest-table tbody td:nth-child(2) { text-align: right; }
.dest-table tbody tr:last-child td { border-bottom: none; }
.seat-empty { color: var(--text-faint); opacity: 0.25; font-size: 0.7rem; font-family: var(--mono); }
.flight-num { font-family: var(--mono); font-weight: 700; font-size: 0.82rem; white-space: nowrap; }
.flight-time { font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; }
.seat-pill {
  display: block; padding: 0.25rem 0.35rem; border-radius: 5px;
  font-family: var(--mono); font-weight: 600; font-size: 0.82rem;
  text-align: center; text-decoration: none; transition: all 0.15s;
  min-width: 38px; margin: 0 auto;
}
.seat-pill.available { background: var(--green-bg); color: var(--green); border: 1px solid transparent; }
a.seat-pill.available { cursor: pointer; }
a.seat-pill.available:hover { background: var(--green-glow); border-color: var(--green); box-shadow: 0 0 12px var(--green-bg); transform: translateY(-1px); }
.seat-pill.below-min { background: var(--yellow-bg); color: var(--yellow); opacity: 0.7; border: 1px solid transparent; }
.seat-pill.zero { background: var(--red-bg); color: var(--red); opacity: 0.55; border: 1px solid transparent; }
.seat-pill.changed { animation: glow 2.5s ease-out; }
@keyframes glow {
  0% { box-shadow: 0 0 15px var(--accent), inset 0 0 8px rgba(79,143,247,0.3); border-color: var(--accent); }
  100% { box-shadow: none; border-color: transparent; }
}

/* ── Change log drawer ── */
.changelog-toggle {
  position: fixed; bottom: 1rem; left: 1rem; z-index: 90;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 0.5rem 0.85rem; cursor: pointer; font-family: var(--font);
  font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.45rem;
  transition: all 0.15s; box-shadow: 0 4px 20px var(--shadow);
}
.changelog-toggle:hover { border-color: var(--accent); color: var(--text); }
.changelog-toggle .cl-count {
  background: var(--accent); color: #fff; font-size: 0.65rem;
  padding: 0.1rem 0.35rem; border-radius: 8px; font-weight: 600; font-family: var(--mono);
}

.changelog-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 95;
  background: var(--surface); border-top: 1px solid var(--border);
  max-height: 45vh; transform: translateY(100%); transition: transform 0.3s ease;
  display: flex; flex-direction: column;
  box-shadow: 0 -8px 40px var(--shadow);
}
.changelog-drawer.open { transform: translateY(0); }
.changelog-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.changelog-drawer-header h3 { font-size: 0.88rem; font-weight: 600; }
.changelog-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 4px;
}
.changelog-close:hover { background: var(--surface2); color: var(--text); }
.changelog-body { overflow-y: auto; padding: 0.5rem 1.25rem; flex: 1; }
.changelog-body::-webkit-scrollbar { width: 4px; }
.changelog-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
.cl-item { padding: 0.65rem 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
.cl-item:last-child { border-bottom: none; }
.cl-row1 { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
.cl-time { font-size: 0.65rem; color: var(--text-faint); font-family: var(--mono); direction: ltr; }
.cl-badge { padding: 0.1rem 0.45rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; font-family: var(--mono); white-space: nowrap; }
.cl-badge.new { background: var(--green-bg); color: var(--green); }
.cl-badge.changed { background: var(--accent-dim); color: var(--accent); }
.cl-badge.removed { background: var(--red-bg); color: var(--red); }
.cl-row2 { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.cl-flight { font-family: var(--mono); font-weight: 700; font-size: 0.88rem; }
.cl-dest-code { font-family: var(--mono); font-weight: 600; font-size: 0.78rem; color: var(--accent); background: var(--accent-dim); padding: 0.08rem 0.4rem; border-radius: 4px; }
.cl-dest-name { font-size: 0.75rem; color: var(--text-dim); }
.cl-row3 { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.25rem; font-size: 0.78rem; color: var(--text-dim); }
.cl-detail { display: flex; align-items: center; gap: 0.25rem; }
.cl-detail-label { font-size: 0.68rem; color: var(--text-faint); }
.cl-seats-val { font-family: var(--mono); font-weight: 600; }
.cl-seats-val.pos { color: var(--green); }
.cl-seats-val.zero { color: var(--red); }
.cl-seats-val.na { color: var(--text-faint); }
.cl-arrow { color: var(--text-faint); font-size: 0.75rem; }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-faint); font-size: 0.88rem; }
.empty-state .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }

/* ── ntfy settings drawer ── */
.ntfy-overlay {
  display: none; position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
}
.ntfy-overlay.open { display: block; }
.ntfy-drawer {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
  width: 340px; max-width: 90vw; background: var(--surface);
  border-inline-end: 1px solid var(--border);
  transform: translateX(-100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column;
  box-shadow: 8px 0 40px var(--shadow);
}
.ntfy-drawer.open { transform: translateX(0); }
.ntfy-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border);
}
.ntfy-drawer-header h3 { font-size: 0.92rem; font-weight: 700; display: flex; align-items: center; gap: 0.45rem; }
.ntfy-drawer-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 4px;
}
.ntfy-drawer-close:hover { background: var(--surface2); color: var(--text); }
.ntfy-body { flex: 1; overflow-y: auto; padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.85rem; }
.ntfy-body::-webkit-scrollbar { width: 4px; }
.ntfy-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.ntfy-field { display: flex; flex-direction: column; gap: 0.3rem; }
.ntfy-field label { font-size: 0.72rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.ntfy-field input[type="text"], .ntfy-field input[type="number"] {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 0.45rem 0.6rem; border-radius: 6px; font-family: var(--mono); font-size: 0.82rem;
}
.ntfy-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

.ntfy-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 0;
}
.ntfy-toggle-row span { font-size: 0.82rem; font-weight: 600; }
.ntfy-switch {
  position: relative; width: 40px; height: 22px; cursor: pointer;
}
.ntfy-switch input { opacity: 0; width: 0; height: 0; }
.ntfy-switch .slider {
  position: absolute; inset: 0; background: var(--surface3); border-radius: 11px; transition: 0.2s;
}
.ntfy-switch .slider::before {
  content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%;
  bottom: 3px; left: 3px; background: var(--text-dim); transition: 0.2s;
}
.ntfy-switch { user-select: none; outline: none; caret-color: transparent; }
.ntfy-switch input:checked + .slider { background: var(--green); }
.ntfy-switch input:checked + .slider::before { transform: translateX(18px); background: #fff; }

.ntfy-radio-group { display: flex; gap: 0.5rem; }
.ntfy-radio {
  flex: 1; padding: 0.45rem 0.6rem; border-radius: 6px; border: 1px solid var(--border);

}
.ntfy-radio.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.ntfy-radio { user-select: none; outline: none; caret-color: transparent; }
.ntfy-btn { user-select: none; outline: none; caret-color: transparent; }

.ntfy-dest-list {
  max-height: 180px; overflow-y: auto; border: 1px solid var(--border);
  border-radius: 6px; background: var(--surface2);
}
.ntfy-dest-list::-webkit-scrollbar { width: 4px; }
.ntfy-dest-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
.ntfy-dest-item {

.ntfy-dest-item:hover { background: var(--accent-dim); }
.ntfy-dest-item input[type="checkbox"] { accent-color: var(--accent); }
.ntfy-dest-item .dest-code { font-family: var(--mono); font-weight: 600; min-width: 32px; }

.ntfy-actions { display: flex; gap: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
.ntfy-btn {

.ntfy-btn-save { background: var(--accent); border-color: var(--accent); color: #fff; }
.ntfy-btn-save:hover { filter: brightness(1.1); }
.ntfy-btn-test { background: var(--surface2); color: var(--text-dim); }
.ntfy-btn-test:hover { border-color: var(--accent); color: var(--text); }
.ntfy-status {

.ntfy-status.ok { color: var(--green); }
.ntfy-status.err { color: var(--red); }

.ntfy-config-item {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.65rem 0.75rem; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);

}
.ntfy-config-item:hover { border-color: var(--accent); background: var(--accent-dim); }

.ntfy-btn-add {
  width: 100%; padding: 0.6rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
  font-family: var(--font); cursor: pointer; border: 1.5px dashed var(--border);
  background: transparent; color: var(--text-dim); transition: all 0.15s;

.date-bar {

  display: inline-flex; align-items: baseline; gap: 0.25rem;
  flex-shrink: 0; line-height: 1;
}
.date-btn:hover { border-color: var(--accent); color: var(--text); }
.date-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.date-btn .day-name { font-size: 0.68rem; color: var(--text-faint); font-weight: 400; }
.date-btn.active .day-name { color: var(--accent); }
.date-btn.no-data { opacity: 0.4; }
.date-btn.no-data.active { opacity: 0.6; }

@media (max-width: 800px) {

  .sidebar.visible { transform: translateX(0); }
  .main { margin-right: 0; }
  :root { --sidebar-w: 0px; }
  .dest-table { font-size: 0.8rem; }
}
</style>
</head>
<body>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>

  Change Log <span class="cl-count" id="clCount">0</span>
</button>

<script>
// ── Theme ──
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

// ── Font size ──
let baseFontSize = parseInt(localStorage.getItem('fontSize') || '15', 10);
const fontInput = document.getElementById('fontSizeInput');
fontInput.value = baseFontSize;
applyFontSize(baseFontSize);

function stepInput(id, delta) {
  const el = document.getElementById(id);
  const min = parseInt(el.min) || -Infinity;
  const max = parseInt(el.max) || Infinity;
  const val = Math.max(min, Math.min(max, (parseInt(el.value) || 0) + delta));
  el.value = val;
  el.dispatchEvent(new Event('change'));
  el.dispatchEvent(new Event('input'));
}

function applyFontSize(px) {
  document.documentElement.style.setProperty('--base-font', px + 'px');
}
fontInput.addEventListener('change', () => {
  baseFontSize = Math.max(10, Math.min(22, parseInt(fontInput.value, 10) || 15));
  fontInput.value = baseFontSize;
  applyFontSize(baseFontSize);
  localStorage.setItem('fontSize', baseFontSize);
});

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  const btn = document.getElementById('themeBtn');
  btn.textContent = theme === 'dark' ? '☀ Light' : '🌙 Dark';
}
updateThemeBtn(savedTheme);

let ws = null;
let soundEnabled = true;
let flights = [];
let changedKeys = new Set();
let allChanges = [];
let reconnectDelay = 1000;
let selectedDests = new Set();
let destSearchText = '';
let minSeats = 1;
let clOpen = false;
let collapsedGroups = new Set();
let scrapedDates = new Set();
let selectedDates = new Set();

const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function pad2(n) { return String(n).padStart(2, '0'); }

function generateWeekDates() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    dates.push(`${pad2(d.getDate())}.${pad2(d.getMonth() + 1)}`);
  }
  return dates;
}

function dateToDayName(ddmm) {
  const [dd, mm] = ddmm.split('.');
  const d = new Date(2026, parseInt(mm) - 1, parseInt(dd));
  return DAY_NAMES[d.getDay()];
}

function dateToFull(ddmm) {
  const [dd, mm] = ddmm.split('.');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(dd)} ${months[parseInt(mm) - 1]}`;
}

const weekDates = generateWeekDates();

function getActiveDates() {
  if (selectedDates.size === 0) return weekDates;
  return weekDates.filter(d => selectedDates.has(d));
}

function renderDateBar() {
  const bar = document.getElementById('dateBar');
  let html = '<span class="date-bar-label">TLV&nbsp;→</span>';
  weekDates.forEach(d => {
    const isSelected = selectedDates.has(d) || selectedDates.size === 0;
    const hasData = scrapedDates.has(d);
    let cls = 'date-btn';
    if (isSelected) cls += ' active';
    if (!hasData) cls += ' no-data';
    const dayName = dateToDayName(d);
    const full = dateToFull(d);
    html += `<button class="${cls}" onclick="toggleDate('${d}')"><span class="day-name">${dayName}</span><span>${full}</span></button>`;
  });
  bar.innerHTML = html;
}

function toggleDate(d) {
  if (selectedDates.has(d)) {
    selectedDates.delete(d);
  } else {
    selectedDates.add(d);
  }
  localStorage.setItem('selectedDates', JSON.stringify([...selectedDates]));
  renderDateBar();
  render();
}

// Restore saved date selection (only keep dates still in the week window)
try {
  const saved = JSON.parse(localStorage.getItem('selectedDates') || '[]');
  const weekSet = new Set(weekDates);
  saved.filter(d => weekSet.has(d)).forEach(d => selectedDates.add(d));
} catch (e) {}

// ── Helpers ──
function extractCode(dest) {
  const m = dest.match(/\(([A-Z]{3})\)/);
  return m ? m[1] : dest.substring(0, 3);
}
function extractName(dest) {
  return dest.replace(/\([A-Z]{3}\)/, '').replace(/,/g, ',').trim();
}
function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
}

// ── Sound ──
function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔊 Sound' : '🔇 Muted';
  btn.classList.toggle('active', soundEnabled);
}
function playAlert() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = [880, 1100, 1320][i];
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.12, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.3);
    });
  } catch (e) {}
}
function sendNotification(title, body) {
  if (Notification.permission === 'granted') new Notification(title, {body});
  else if (Notification.permission !== 'denied') Notification.requestPermission();
}

// ── Min seats ──
document.getElementById('minSeatsInput').addEventListener('input', () => {
  const v = parseInt(document.getElementById('minSeatsInput').value);
  minSeats = (v && v >= 1) ? v : 1;
  render();
});

// ── Destinations ──
function getDestMap() {
  const dates = getActiveDates();
  const dateSet = new Set(dates);
  const map = {};
  flights.forEach(f => {
    if (!dateSet.has(f.date)) return;
    const code = extractCode(f.destination);
    if (!map[code]) map[code] = { code, fullName: f.destination, name: extractName(f.destination), flights: new Set(), maxSeats: 0 };
    map[code].flights.add(f.flight_number);
    if (f.seats !== null && f.seats > 0) map[code].maxSeats = Math.max(map[code].maxSeats, f.seats);
  });
  return map;
}

function renderSidebar() {
  const map = getDestMap();
  const dests = Object.values(map).sort((a, b) => a.code.localeCompare(b.code));
  const q = destSearchText.toLowerCase();
  const filtered = q ? dests.filter(d => d.code.toLowerCase().includes(q) || d.name.toLowerCase().includes(q)) : dests;

  document.getElementById('destCount').textContent = `${filtered.length}`;

  const html = filtered.map(d => {
    const sel = selectedDests.size === 0 || selectedDests.has(d.code) ? ' selected' : '';
    const hasSeatsCls = d.maxSeats >= minSeats ? 'has-seats' : 'no-seats';
    const seatLabel = d.maxSeats >= minSeats ? `${d.maxSeats >= 9 ? '9+' : d.maxSeats}` : '—';
    return `<div class="dest-item${sel}" onclick="toggleDest('${d.code}')">
      <div class="dest-item-check"></div>
      <span class="dest-item-code">${d.code}</span>
      <span class="dest-item-name">${d.name}</span>
      <span class="dest-item-badge ${hasSeatsCls}">${seatLabel}</span>
    </div>`;
  }).join('');
  document.getElementById('destList').innerHTML = html || '<div class="empty-state" style="padding:1.5rem">No match</div>';
}

document.getElementById('destSearch').addEventListener('input', (e) => {
  destSearchText = e.target.value.trim();
  renderSidebar();
});

function toggleDest(code) {
  if (selectedDests.has(code)) selectedDests.delete(code);
  else selectedDests.add(code);
  render();
}
function clearFilter() { selectedDests.clear(); render(); }
function selectAll() {
  const map = getDestMap();
  Object.keys(map).forEach(c => selectedDests.add(c));
  render();
}
function selectWithSeats() {
  selectedDests.clear();
  const map = getDestMap();
  Object.values(map).forEach(d => { if (d.maxSeats >= minSeats) selectedDests.add(d.code); });
  render();
}

// ── Render ──
function render() {
  renderDateBar();
  renderSidebar();
  renderFlights();
}

function renderFlights() {
  const container = document.getElementById('flightContent');

  if (flights.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">✈</div>Waiting for first scrape…</div>';
    return;
  }

  const DATES = getActiveDates();
  const dateSet = new Set(DATES);

  const visible = flights.filter(f => {
    if (!dateSet.has(f.date)) return false;
    const code = extractCode(f.destination);
    return selectedDests.size === 0 || selectedDests.has(code);
  });

  // Group by destination
  const groups = {};
  visible.forEach(f => {
    const code = extractCode(f.destination);
    if (!groups[code]) groups[code] = { code, name: extractName(f.destination), flights: {} };
    const key = `${f.flight_number}_${f.time}`;
    if (!groups[code].flights[key]) groups[code].flights[key] = { flight_number: f.flight_number, time: f.time, dates: {}, urls: {} };
    groups[code].flights[key].dates[f.date] = f.seats;
    if (f.book_url) groups[code].flights[key].urls[f.date] = f.book_url;
  });

  // Filter: keep only flights that exist on at least one selected date
  Object.values(groups).forEach(g => {
    for (const key of Object.keys(g.flights)) {
      const fl = g.flights[key];
      const hasAnyDate = DATES.some(d => fl.dates[d] !== null && fl.dates[d] !== undefined);
      if (!hasAnyDate) delete g.flights[key];
    }
  });

  const sortedGroups = Object.values(groups)
    .filter(g => Object.keys(g.flights).length > 0)
    .sort((a, b) => a.code.localeCompare(b.code));

  // Stats
  let totalFlightRows = 0;
  let totalAvailable = 0;
  sortedGroups.forEach(g => {
    const fArr = Object.values(g.flights);
    totalFlightRows += fArr.length;
    fArr.forEach(fl => DATES.forEach(d => { if (fl.dates[d] !== null && fl.dates[d] !== undefined && fl.dates[d] >= minSeats) totalAvailable++; }));
  });
  document.getElementById('statDests').textContent = sortedGroups.length;
  document.getElementById('statFlights').textContent = totalFlightRows;
  document.getElementById('statAvailable').textContent = totalAvailable;

  if (sortedGroups.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>No flights match filter</div>';
    return;
  }

  let html = '';
  sortedGroups.forEach(g => {
    const fArr = Object.values(g.flights).sort((a, b) => a.time.localeCompare(b.time));
    const groupMaxSeats = Math.max(0, ...fArr.flatMap(fl => DATES.map(d => fl.dates[d] ?? 0)));
    const hasSeats = groupMaxSeats >= minSeats;
    const collapsed = collapsedGroups.has(g.code);

    html += `<div class="dest-group">`;
    html += `<div class="dest-group-header" onclick="toggleGroup('${g.code}')">`;
    html += `<span class="dest-group-toggle ${collapsed ? '' : 'open'}">▶</span>`;
    html += `<span class="dest-group-code">${g.code}</span>`;
    html += `<span class="dest-group-name">${g.name}</span>`;
    html += `<span class="dest-group-seats-tag ${hasSeats ? 'available' : 'none'}">${hasSeats ? (groupMaxSeats >= 9 ? '9+ seats' : groupMaxSeats + ' seats') : 'no seats'}</span>`;
    html += `</div>`;

    if (!collapsed) {
      html += `<table class="dest-table"><thead><tr>`;
      html += `<th>Flight</th><th>Time</th>`;
      DATES.forEach(d => html += `<th>${dateToDayName(d)}<br>${dateToFull(d)}</th>`);
      html += `</tr></thead><tbody>`;
      fArr.forEach(fl => {
        html += `<tr><td><span class="flight-num">${fl.flight_number}</span></td>`;
        html += `<td><span class="flight-time">${fl.time}</span></td>`;
        DATES.forEach(d => {
          const seats = fl.dates[d];
          const url = fl.urls[d];
          const cellKey = `${fl.flight_number}_${fl.time}_${d}`;
          const isChanged = changedKeys.has(cellKey);
          const chCls = isChanged ? ' changed' : '';
          const label = (seats !== null && seats !== undefined) ? (seats >= 9 ? '9+' : seats) : '';

          html += `<td>`;
          if (seats === null || seats === undefined) {
            html += `<span class="seat-empty">—</span>`;
          } else if (seats === 0) {
            html += `<div class="seat-pill zero${chCls}">0</div>`;
          } else if (seats < minSeats) {
            html += `<div class="seat-pill below-min${chCls}">${label}</div>`;
          } else if (url) {
            html += `<a href="${url}" target="_blank" rel="noopener" class="seat-pill available${chCls}">${label}</a>`;
          } else {
            html += `<div class="seat-pill available${chCls}">${label}</div>`;
          }
          html += `</td>`;
        });
        html += `</tr>`;
      });
      html += `</tbody></table>`;
    }
    html += `</div>`;
  });

  container.innerHTML = html;
}

function toggleGroup(code) {
  if (collapsedGroups.has(code)) collapsedGroups.delete(code);
  else collapsedGroups.add(code);
  renderFlights();
}

// ── Change log ──
function toggleChangelog() {
  clOpen = !clOpen;
  document.getElementById('clDrawer').classList.toggle('open', clOpen);
}

function seatsCls(n) {
  if (n === null || n === undefined) return 'na';
  return n > 0 ? 'pos' : 'zero';
}
function seatsLabel(n) {
  if (n === null || n === undefined) return '—';
  return n >= 9 ? '9+' : String(n);
}

function renderChanges(data) {
  document.getElementById('clCount').textContent = data.length;
  const body = document.getElementById('clBody');
  if (!data.length) { body.innerHTML = '<div class="empty-state">No changes yet</div>'; return; }

  body.innerHTML = data.map(c => {
    const dest = c.destination || '';
    const code = extractCode(dest);
    const name = dest ? extractName(dest) : '';
    let badge = '';
    if (c.change_type === 'new_flight') badge = '<span class="cl-badge new">NEW</span>';
    else if (c.change_type === 'seats_changed') badge = '<span class="cl-badge changed">SEATS</span>';
    else badge = '<span class="cl-badge removed">GONE</span>';

    let seatsHtml = '';
    if (c.change_type === 'seats_changed') {
      seatsHtml = `<span class="cl-detail"><span class="cl-detail-label">Seats:</span> <span class="cl-seats-val ${seatsCls(c.old_seats)}">${seatsLabel(c.old_seats)}</span> <span class="cl-arrow">→</span> <span class="cl-seats-val ${seatsCls(c.new_seats)}">${seatsLabel(c.new_seats)}</span></span>`;
    } else if (c.change_type === 'new_flight') {
      seatsHtml = `<span class="cl-detail"><span class="cl-detail-label">Seats:</span> <span class="cl-seats-val ${seatsCls(c.new_seats)}">${seatsLabel(c.new_seats)}</span></span>`;
    } else {
      seatsHtml = `<span class="cl-detail"><span class="cl-detail-label">Was:</span> <span class="cl-seats-val ${seatsCls(c.old_seats)}">${seatsLabel(c.old_seats)}</span></span>`;
    }

    return `<div class="cl-item">
      <div class="cl-row1"><span class="cl-time">${formatTime(c.timestamp)}</span>${badge}</div>
      <div class="cl-row2"><span class="cl-flight">${c.flight_number}</span>${code ? `<span class="cl-dest-code">${code}</span>` : ''}${name ? `<span class="cl-dest-name">${name}</span>` : ''}</div>
      <div class="cl-row3"><span class="cl-detail"><span class="cl-detail-label">Date:</span> ${c.date}</span><span class="cl-detail"><span class="cl-detail-label">Time:</span> ${c.time}</span>${seatsHtml}</div>
    </div>`;
  }).join('');
}

// ── Alert ──
function showAlert(changes) {
  const activeDateSet = new Set(getActiveDates());
  const important = changes.filter(c =>
    activeDateSet.has(c.date) && (
      (c.change_type === 'new_flight' && c.new_seats !== null && c.new_seats >= minSeats) ||
      (c.change_type === 'seats_changed' && c.new_seats !== null && c.new_seats >= minSeats && (c.old_seats === null || c.old_seats < minSeats))
    )
  );
  if (!important.length) return;

  playAlert();

  const banner = document.getElementById('alertBanner');
  document.getElementById('alertTitle').textContent = `${important.length} flight${important.length > 1 ? 's' : ''} now available!`;

  const listHtml = important.map(c => {
    const dest = c.destination || '';
    const code = extractCode(dest);
    const name = extractName(dest);
    const seatsLabel = c.new_seats >= 9 ? '9+' : c.new_seats;
    const prevInfo = (c.change_type === 'seats_changed' && c.old_seats !== null)
      ? ` (was ${c.old_seats})` : '';

    const match = flights.find(f => f.flight_number === c.flight_number && f.time === c.time && f.date === c.date);
    let url = match?.book_url;
    if (!url && code) {
      const dd = c.date.split('.')[0];
      const mm = c.date.split('.')[1];
      url = `https://www.elal.com/heb/book-a-flight?from=TLV&dest=${code}&dtfrom=2026-${mm}-${dd}&journey=one_way`;
    }

    const tag = url ? 'a' : 'div';
    const linkAttrs = url ? ` href="${url}" target="_blank" rel="noopener"` : '';
    return `<${tag} class="alert-flight"${linkAttrs}>
      <span class="af-dest">${code}</span>
      <span class="af-fn">${c.flight_number}</span>
      <span class="af-detail">${name} · ${c.time} · ${c.date}${prevInfo}</span>
      <span class="af-seats">${seatsLabel} seats</span>
    </${tag}>`;
  }).join('');
  document.getElementById('alertList').innerHTML = listHtml;

  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 20000);

  const notifLines = important.map(c => {
    const code = extractCode(c.destination || '');
    const name = extractName(c.destination || '');
    return `${code} ${c.flight_number} · ${name} · ${c.time} · ${c.date} → ${c.new_seats >= 9 ? '9+' : c.new_seats} seats`;
  });
  sendNotification(
    `El Al — ${important.length} flight${important.length > 1 ? 's' : ''} available!`,
    notifLines.join('\n')
  );
}

// ── Status ──
function updateStatus(ok, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (ok === true ? 'ok' : ok === false ? 'err' : 'wait');
  document.getElementById('statusText').textContent = text;
  if (text.includes('Last scrape')) {
    document.getElementById('statTime').textContent = text.replace('Last scrape: ', '');
  }
}

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => { reconnectDelay = 1000; updateStatus(true, 'Connected'); };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'initial') {
      flights = msg.flights || [];
      if (msg.status?.available_dates?.length) {
        scrapedDates = new Set(msg.status.available_dates);
      }
      render();
      allChanges = msg.changes || [];
      renderChanges(allChanges);
      if (msg.status?.last_success) updateStatus(true, `Last scrape: ${formatTime(msg.status.last_success)}`);
    }

    if (msg.type === 'scrape_complete') {
      changedKeys = new Set();
      (msg.changes || []).forEach(c => changedKeys.add(`${c.flight_number}_${c.time}_${c.date}`));
      flights = msg.flights || [];
      if (msg.available_dates?.length) {
        scrapedDates = new Set(msg.available_dates);
      }
      render();
      if (msg.changes?.length > 0) {
        allChanges = [...msg.changes, ...allChanges].slice(0, 200);
        renderChanges(allChanges);
        showAlert(msg.changes);
      }
      updateStatus(true, `Last scrape: ${formatTime(msg.timestamp)} (${msg.record_count} records)`);
    }

    if (msg.type === 'scrape_error') {
      updateStatus(false, `Error: ${msg.error?.substring(0, 50)}`);
    }
  };

  ws.onclose = () => {
    updateStatus(null, `Reconnecting…`);
    setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 2, 30000); connect(); }, reconnectDelay);
  };
  ws.onerror = () => ws.close();
}

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
connect();

// ── ntfy settings (multi-config) ──
let ntfyConfigs = [];
let ntfyEditId = null;
let ntfyMode = 'all';
let ntfySelectedDests = new Set();

function toggleNtfyDrawer() {
  const drawer = document.getElementById('ntfyDrawer');
  const overlay = document.getElementById('ntfyOverlay');
  const open = drawer.classList.toggle('open');
  overlay.classList.toggle('open', open);
  if (open) { ntfyShowList(); loadNtfyConfigs(); }
}

function ntfyShowList() {
  document.getElementById('ntfyListView').style.display = '';
  document.getElementById('ntfyEditView').style.display = 'none';
}

function ntfyShowEdit() {
  document.getElementById('ntfyListView').style.display = 'none';
  document.getElementById('ntfyEditView').style.display = '';
}

async function loadNtfyConfigs() {
  try {
    const resp = await fetch('/api/ntfy/configs');
    ntfyConfigs = await resp.json();
    renderNtfyList();
    updateNtfyBtn();
  } catch (e) {
    console.error('Failed to load ntfy configs', e);
  }
}

function renderNtfyList() {
  const container = document.getElementById('ntfyConfigList');
  if (ntfyConfigs.length === 0) {
    container.innerHTML = '<div class="ntfy-empty">No notifications configured yet</div>';
    return;
  }
  container.innerHTML = ntfyConfigs.map(cfg => {
    const destInfo = cfg.mode === 'all' ? 'All destinations' : `${cfg.destinations.length} destination${cfg.destinations.length !== 1 ? 's' : ''}`;
    const detail = cfg.topic ? `${cfg.topic} · ${destInfo} · ≥${cfg.min_seats} seats` : 'Not configured';
    return `<div class="ntfy-config-item" onclick="ntfyEdit(${cfg.id})">
      <div class="nci-status ${cfg.enabled ? 'on' : 'off'}"></div>
      <div class="nci-info">
        <div class="nci-name">${cfg.name}</div>
        <div class="nci-detail">${detail}</div>
      </div>
      <span class="nci-arrow">›</span>
    </div>`;
  }).join('');
}

function ntfyEditNew() {
  ntfyEditId = null;
  document.getElementById('ntfyName').value = '';
  document.getElementById('ntfyEnabled').checked = true;
  document.getElementById('ntfyServerUrl').value = 'https://ntfy.sh';
  document.getElementById('ntfyTopic').value = '';
  document.getElementById('ntfyMinSeats').value = '1';
  ntfyMode = 'all';
  ntfySelectedDests = new Set();
  updateNtfyModeUI();
  renderNtfyDests();
  document.getElementById('ntfyDeleteBtn').style.display = 'none';
  document.getElementById('ntfyStatus').textContent = '';
  ntfyShowEdit();
}

function ntfyEdit(id) {
  const cfg = ntfyConfigs.find(c => c.id === id);
  if (!cfg) return;
  ntfyEditId = id;
  document.getElementById('ntfyName').value = cfg.name;
  document.getElementById('ntfyEnabled').checked = cfg.enabled;
  document.getElementById('ntfyServerUrl').value = cfg.server_url;
  document.getElementById('ntfyTopic').value = cfg.topic;
  document.getElementById('ntfyMinSeats').value = cfg.min_seats;
  ntfyMode = cfg.mode || 'all';
  ntfySelectedDests = new Set(cfg.destinations || []);
  updateNtfyModeUI();
  renderNtfyDests();
  document.getElementById('ntfyDeleteBtn').style.display = '';
  document.getElementById('ntfyStatus').textContent = '';
  ntfyShowEdit();
}

function ntfyBackToList() {
  ntfyShowList();
  loadNtfyConfigs();
}

function setNtfyMode(mode) {
  ntfyMode = mode;
  updateNtfyModeUI();
}

function updateNtfyModeUI() {
  document.getElementById('ntfyModeAll').classList.toggle('active', ntfyMode === 'all');
  document.getElementById('ntfyModeSelected').classList.toggle('active', ntfyMode === 'selected');
  document.getElementById('ntfyDestField').style.display = ntfyMode === 'selected' ? '' : 'none';
}

function renderNtfyDests() {
  const list = document.getElementById('ntfyDestList');
  const destMap = getDestMap();
  const dests = Object.values(destMap).sort((a, b) => a.code.localeCompare(b.code));
  if (dests.length === 0) {
    list.innerHTML = '<div style="padding:0.8rem;color:var(--text-faint);font-size:0.78rem;text-align:center">No destinations yet</div>';
    return;
  }
  list.innerHTML = dests.map(d => {
    const checked = ntfySelectedDests.has(d.code) ? ' checked' : '';
    return `<label class="ntfy-dest-item">
      <input type="checkbox" value="${d.code}"${checked} onchange="toggleNtfyDest('${d.code}', this.checked)">
      <span class="dest-code">${d.code}</span>
      <span class="dest-name">${d.name}</span>
    </label>`;
  }).join('');
}

function toggleNtfyDest(code, checked) {
  if (checked) ntfySelectedDests.add(code);
  else ntfySelectedDests.delete(code);
}

function updateNtfyBtn() {
  const btn = document.getElementById('ntfyBtn');
  const anyEnabled = ntfyConfigs.some(c => c.enabled);
  btn.classList.toggle('active', anyEnabled);
  btn.textContent = anyEnabled ? '🔔 Notifications' : '🔕 Notifications';
}

function _getEditFormData() {
  return {
    id: ntfyEditId || undefined,
    name: document.getElementById('ntfyName').value.trim() || 'Notification',
    enabled: document.getElementById('ntfyEnabled').checked,
    server_url: document.getElementById('ntfyServerUrl').value.trim() || 'https://ntfy.sh',
    topic: document.getElementById('ntfyTopic').value.trim(),
    mode: ntfyMode,
    min_seats: parseInt(document.getElementById('ntfyMinSeats').value) || 1,
    destinations: [...ntfySelectedDests],
  };
}

async function saveNtfyConfig() {
  const status = document.getElementById('ntfyStatus');
  status.textContent = 'Saving…';
  status.className = 'ntfy-status';
  const cfg = _getEditFormData();
  try {
    const resp = await fetch('/api/ntfy/configs', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(cfg),
    });
    const saved = await resp.json();
    if (saved.id) {
      ntfyEditId = saved.id;
      document.getElementById('ntfyDeleteBtn').style.display = '';
      status.textContent = 'Saved';
      status.className = 'ntfy-status ok';
      await loadNtfyConfigs();
    } else {
      status.textContent = 'Save failed';
      status.className = 'ntfy-status err';
    }
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'ntfy-status err';
  }
  setTimeout(() => { status.textContent = ''; status.className = 'ntfy-status'; }, 3000);
}

async function deleteNtfyConfig() {
  if (!ntfyEditId || !confirm('Delete this notification?')) return;
  try {
    await fetch(`/api/ntfy/configs/${ntfyEditId}`, { method: 'DELETE' });
    ntfyEditId = null;
    await loadNtfyConfigs();
    ntfyShowList();
  } catch (e) {
    console.error('Delete failed', e);
  }
}

async function testNtfy() {
  const status = document.getElementById('ntfyStatus');
  await saveNtfyConfig();
  if (!ntfyEditId) return;
  status.textContent = 'Sending test…';
  status.className = 'ntfy-status';
  try {
    const resp = await fetch(`/api/ntfy/test/${ntfyEditId}`, { method: 'POST' });
    const result = await resp.json();
    if (result.ok) {
      status.textContent = 'Test sent! Check your phone.';
      status.className = 'ntfy-status ok';
    } else {
      status.textContent = result.error || 'Test failed';
      status.className = 'ntfy-status err';
    }
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'ntfy-status err';
  }
  setTimeout(() => { status.textContent = ''; status.className = 'ntfy-status'; }, 5000);
}
</script>
